[mgr]
# 布局比例：[父目录, 当前目录, 预览]
ratio = [1, 4, 3]

# 排序方式
sort_by = "natural"        # none, mtime, btime, extension, alphabetical, natural, size, random
sort_sensitive = false     # 是否区分大小写
sort_reverse = false       # 反向排序
sort_dir_first = true      # 目录优先

# 显示隐藏文件
show_hidden = false
show_symlink = true

# 滚动偏移（光标上下保留的文件数）
scrolloff = 5

# 行模式（右侧显示的信息）
linemode = "none"          # none, size, btime, mtime, permissions, owner

[preview]
# 预览设置
wrap = "no"                # 代码预览换行
tab_size = 4               # Tab 宽度
max_width = 1920            # 图片预览最大宽度
max_height = 1080           # 图片预览最大高度

# 文件打开器配置
[opener]
# 编辑类：使用 nvim
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]
# 打开类：使用 macOS Open
open = [
    { run = 'open "$@"', desc = "Open with Default App" },
]
# 专门用于打开文件夹（可选，防止回车进不去目录）
reveal = [
    { run = 'open -R "$@"', desc = "Reveal in Finder" },
]

[open]
# 文件类型与打开器映射
rules = [
    # 1. 目录优先处理：按回车用 Finder 打开
    { mime = "inode/directory", use = "open" }, 
    
    # 2. 文本与代码类：强制使用 nvim
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/x-shellscript", use = "edit" },
    
    # 3. 常见后缀名补漏（防止 MIME 识别不准）
    { mime = "text/*", name = "*.cfg", use = "edit" },
    { mime = "text/*", name = "*.conf", use = "edit" },
    { mime = "text/*", name = "*.cpp", use = "edit" },
    { mime = "text/*", name = "*.ini", use = "edit" },
    { mime = "text/*", name = "*.json", use = "edit" },
    { mime = "text/*", name = "*.lua", use = "edit" },
    { mime = "text/*", name = "*.toml", use = "edit" },
    { mime = "text/*", name = "*.yaml", use = "edit" },
    { mime = "text/*", name = "*.yml", use = "edit" },
    
    # 4. 多媒体与其他：使用系统默认应用
    { mime = "image/*", use = "open" },
    { mime = "video/*", use = "open" },
    { mime = "audio/*", use = "open" },
    { mime = "application/pdf", use = "open" },
    { mime = "application/zip", use = "open" },
]

# 预览器设置，基于Piper
[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

# MacTag插件
[[plugin.prepend_fetchers]]
id     = "mactag" # Remove if Yazi > v26.1.22
url    = "*"
run    = "mactag"
group  = "mactag"

[[plugin.prepend_fetchers]]
id     = "mactag" # Remove if Yazi > v26.1.22
url    = "*/"
run    = "mactag"
group  = "mactag"

# Git 插件
[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*/"
run   = "git"
group = "git"
